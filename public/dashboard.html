<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found AI - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="top-bar">
        <div class="logo">Lost & Found AI</div>
        <div class="nav-icons">
            <div class="notif-bell" onclick="document.getElementById('notifications-section').scrollIntoView({behavior: 'smooth'})">
                🔔 <span id="notif-badge" class="badge" style="display: none;">0</span>
            </div>
            <button class="btn-secondary logout-btn" onclick="sessionStorage.clear(); window.location.href='/'">Logout</button>
        </div>
    </nav>

    <main class="glass-container" style="max-width: 700px; margin-top: 40px; padding: 2rem;">
        <header>
            <h1 style="font-size: 2rem;">Unified Dashboard</h1>
            <p>Welcome back! Select an action below.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('owner-tab', this)">Upload valuable item</button>
            <button class="tab-btn" onclick="switchTab('finder-tab', this)">Found an item</button>
        </div>

        <!-- OWNER TAB -->
        <section id="owner-tab" class="tab-content active">
            <h2>Register a Lost Item</h2>
            <p class="privacy-note">Upload a photo. The AI will secure it mathematically.</p>
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-image">Item Photo (JPEG/PNG)</label>
                    <input type="file" id="reg-image" accept="image/*" required>
                </div>
                <button type="submit" class="btn-primary">Secure Item</button>
            </form>
            <div id="reg-feedback" class="feedback"></div>
        </section>

        <!-- FINDER TAB -->
        <section id="finder-tab" class="tab-content">
            <h2>Find the Owner</h2>
            <p class="privacy-note">Found something? Let the AI scan the database for matches.</p>
            <form id="found-form">
                <div class="input-group">
                    <label for="found-image">Item Photo (JPEG/PNG)</label>
                    <input type="file" id="found-image" accept="image/*" required>
                </div>
                <button type="submit" class="btn-primary" style="background: #34d399; border-color: #34d399; color: #000;">Scan & Match</button>
            </form>
            <div id="found-feedback" class="feedback"></div>
        </section>

        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 30px 0;">

        <section id="notifications-section" style="display: none; margin-bottom: 20px;">
            <h2>Action Required (Matches)</h2>
            <div class="items-grid" id="notifications-list"></div>
        </section>

        <section id="history-section">
            <h2>Your Upload History</h2>
            <div class="items-grid" id="items-list"></div>
        </section>

    </main>

    <!-- Modal for match info -->
    <div id="match-modal" class="modal hidden">
        <div class="glass-card">
            <h2>Match Found!</h2>
            <div id="match-details-container"></div>
            <button class="btn-secondary" onclick="closeModal()">Close</button>
        </div>
    </div>

    <!-- Modal for viewing full images -->
    <div id="image-modal" class="img-modal">
        <span class="close-modal" onclick="document.getElementById('image-modal').style.display='none'">&times;</span>
        <img id="full-image" src="" />
    </div>

    <script src="app.js"></script>
    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
