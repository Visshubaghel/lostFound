<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-bar">
        <div class="logo">BITS Lost & Found</div>
        <div class="nav-icons">
            <div class="notif-bell" onclick="document.getElementById('notifications-section').scrollIntoView({behavior: 'smooth'})">
                🔔 <span id="notif-badge" class="badge" style="display:none;">0</span>
            </div>
            <button onclick="window.location.href='/'" class="btn-secondary logout-btn">Logout</button>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="glass-container" style="max-width: 600px;">
        <header>
            <h1>Owner Dashboard</h1>
            <p>Secure Your Valuables</p>
        </header>
        
        <section id="register-section" class="tab-content active">
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-image">Upload Picture of your Valuable</label>
                    <input type="file" id="reg-image" accept="image/*" required>
                    <small style="color: var(--text-muted); display: block; margin-top: 5px;">Our AI will automatically generate a semantic descriptor.</small>
                </div>
                <button type="submit" class="btn-primary">Secure Item</button>
            </form>
            <div id="reg-feedback" class="feedback"></div>
        </section>

        <section id="notifications-section" class="tab-content active" style="margin-top: 2rem; display: none;">
            <h2>Alerts & Notifications</h2>
            <div id="notifications-list" class="items-grid">
                <!-- Notifications will load here dynamically -->
            </div>
        </section>

        <section class="tab-content active" style="margin-top: 2rem;">
            <h2>Your Uploaded Items</h2>
            <div id="items-list" class="items-grid">
                <!-- Items will be loaded here dynamically -->
            </div>
        </section>
    </main>
    </div>
    
    <!-- Full Image Modal -->
    <div id="image-modal" class="img-modal">
        <span class="close-modal" onclick="document.getElementById('image-modal').style.display='none'">&times;</span>
        <img id="full-image" src="">
    </div>

    <script src="app.js"></script>
</body>
</html>
