<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finder Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="top-bar">
        <div class="logo">BITS Lost & Found</div>
        <div class="nav-icons">
            <div class="notif-bell" onclick="document.getElementById('notifications-section').scrollIntoView({behavior: 'smooth'})">
                🔔 <span id="notif-badge" class="badge" style="display:none;">0</span>
            </div>
            <button onclick="window.location.href='/'" class="btn-secondary logout-btn">Logout</button>
        </div>
    </div>

    <main class="glass-container" style="max-width: 600px; margin-top: 80px;">
        <header>
            <h1 class="gradient-text">Finder Dashboard</h1>
            <p>Report a Found Item</p>
        </header>
        
        <section id="found-section" class="tab-content active">
            <p class="privacy-note">Photos remain private. The owner will be verified securely.</p>
            <form id="found-form">
                <div class="input-group">
                    <label for="found-image">Upload Picture of Found Item</label>
                    <input type="file" id="found-image" accept="image/*" required>
                    <small style="color: var(--text-muted); display: block; margin-top: 5px;">Our AI will securely match this against registered items.</small>
                </div>
                <button type="submit" class="btn-primary">Find Owner</button>
            </form>
            <div id="found-feedback" class="feedback"></div>
        </section>
        
        <div id="match-modal" class="modal hidden">
            <div class="modal-content glass-card">
                <h2>Match Found! 🎉</h2>
                <p>We found the rightful owner for this item.</p>
                <div class="match-details" id="match-details-container"></div>
                <button class="btn-secondary" onclick="closeModal()">Schedule Meetup</button>
            </div>
        </div>

        <section id="notifications-section" class="tab-content active" style="margin-top: 2rem; display: none;">
            <h2>Alerts & Notifications</h2>
            <div id="notifications-list" class="items-grid">
                <!-- Notifications will load here dynamically -->
            </div>
        </section>

        <section class="tab-content active" style="margin-top: 2rem;">
            <h2>Your Reported Found Items</h2>
            <div id="items-list" class="items-grid">
                <!-- Items will be loaded here dynamically -->
            </div>
        </section>

        <div style="margin-top: 2rem; text-align: center;">
        </div>
    </main>

    <!-- Full Image Modal -->
    <div id="image-modal" class="img-modal">
        <span class="close-modal" onclick="document.getElementById('image-modal').style.display='none'">&times;</span>
        <img id="full-image" src="">
    </div>

    <script src="app.js"></script>
</body>
</html>
